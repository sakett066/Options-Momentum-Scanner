name: Options Momentum Scanner

on:
  schedule:
    - cron: '20 1 * * 0-4'
    - cron: '45 1 * * 0-4'
    - cron: '30 2 * * 0-4'
    - cron: '30 3 * * 0-4'
    - cron: '30 4 * * 0-4'
    - cron: '30 5 * * 0-4'
    - cron: '15 6 * * 0-4'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install packages
        run: pip install nsetools requests numpy
      - name: Run Options Scanner
        env:
          TELEGRAM_OPTIONS_BOT_TOKEN: ${{ secrets.TELEGRAM_OPTIONS_BOT_TOKEN }}
          TELEGRAM_OPTIONS_CHAT_ID: ${{ secrets.TELEGRAM_OPTIONS_CHAT_ID }}
          TZ: Asia/Kolkata
        run: python options_scanner.py
