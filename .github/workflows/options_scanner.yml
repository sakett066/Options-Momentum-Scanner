name: Options Momentum Scanner

on:
  schedule:
    # 9:20 AM - After first 15 min OI data settles
    - cron: '20 1 * * 0-4'
    # 9:45 AM - Confirm direction
    - cron: '45 1 * * 0-4'
    # 10:30 AM - Momentum check
    - cron: '30 2 * * 0-4'
    # 11:30 AM
    - cron: '30 3 * * 0-4'
    # 12:30 PM
    - cron: '30 4 * * 0-4'
    # 1:30 PM - Start exit warnings
    - cron: '30 5 * * 0-4'
    # 2:15 PM - Final exit call
    - cron: '15 6 * * 0-4'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install packages
        run: pip install nsetools requests
      - name: Run Options Scanner
        env:
          TELEGRAM_OPTIONS_BOT_TOKEN: ${{ secrets.TELEGRAM_OPTIONS_BOT_TOKEN }}
          TELEGRAM_OPTIONS_CHAT_ID: ${{ secrets.TELEGRAM_OPTIONS_CHAT_ID }}
          TZ: Asia/Kolkata
        run: python options_scanner.py
