name: Auto Options Trader

on:
  schedule:
    # 9:45 AM - Entry time
    - cron: '45 1 * * 0-4'
    # 10:00 AM - Confirm entry
    - cron: '0 2 * * 0-4'
    # 10:15 AM - Last entry chance
    - cron: '15 2 * * 0-4'
    # 12:00 PM - Midday check
    - cron: '0 4 * * 0-4'
    # 2:00 PM - Pre-exit warning
    - cron: '0 6 * * 0-4'
    # 2:15 PM - EXIT ALL
    - cron: '15 6 * * 0-4'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install packages
        run: pip install nsetools requests
      - name: Run Auto Trader
        env:
          TELEGRAM_OPTIONS_BOT_TOKEN: ${{ secrets.TELEGRAM_OPTIONS_BOT_TOKEN }}
          TELEGRAM_OPTIONS_CHAT_ID: ${{ secrets.TELEGRAM_OPTIONS_CHAT_ID }}
          TZ: Asia/Kolkata
        run: python auto_options_trader.py
