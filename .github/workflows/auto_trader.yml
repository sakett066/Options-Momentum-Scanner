name: Auto Options Trader

on:
  schedule:
    - cron: '45 1 * * 0-4'
    - cron: '0 2 * * 0-4'
    - cron: '15 2 * * 0-4'
    - cron: '0 4 * * 0-4'
    - cron: '0 6 * * 0-4'
    - cron: '15 6 * * 0-4'
  workflow_dispatch:

jobs:
  simplified:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install packages
        run: pip install nsetools requests
      - name: Run Simplified Trader
        env:
          TELEGRAM_OPTIONS_BOT_TOKEN: ${{ secrets.TELEGRAM_OPTIONS_BOT_TOKEN }}
          TELEGRAM_OPTIONS_CHAT_ID: ${{ secrets.TELEGRAM_OPTIONS_CHAT_ID }}
          TZ: Asia/Kolkata
        run: python auto_options_trader.py

  robust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install packages
        run: pip install nsetools requests numpy
      - name: Run Robust Trader
        env:
          TELEGRAM_OPTIONS_BOT_TOKEN: ${{ secrets.TELEGRAM_OPTIONS_BOT_TOKEN }}
          TELEGRAM_OPTIONS_CHAT_ID: ${{ secrets.TELEGRAM_OPTIONS_CHAT_ID }}
          TZ: Asia/Kolkata
        run: python auto_options_robust.py
